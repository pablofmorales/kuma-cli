name: Release

on:
  workflow_dispatch:

# Only one release job at a time; cancel if a newer push lands while running
concurrency:
  group: release
  cancel-in-progress: false   # don't cancel mid-release — let it finish

permissions:
  contents: write        # create tags + GitHub Release
  issues: write          # comment on issues when fixed by a release
  pull-requests: write   # comment on PRs when included in a release
  id-token: write        # npm provenance (optional but good practice)

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so semantic-release can walk all commits
          fetch-depth: 0
          # Use GH_PAT so the release commit triggers CI on main again
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release

      - name: Update Homebrew Tap
        if: success()
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          # Get the new version released by semantic-release
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "Updating homebrew-tap formula for kuma-cli v${NEW_VERSION}"

          # Download the tarball and compute SHA256
          TGZ_URL="https://registry.npmjs.org/@blackasteroid/kuma-cli/-/kuma-cli-${NEW_VERSION}.tgz"
          curl -sL "$TGZ_URL" -o /tmp/kuma-cli.tgz
          SHA256=$(sha256sum /tmp/kuma-cli.tgz | awk '{print $1}')
          echo "SHA256: $SHA256"

          # Clone the tap repo
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/pablofmorales/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          git config user.email "dante@blackasteroid.com.ar"
          git config user.name "Dante (DevOps) [bot]"

          # Update the formula
          cat > Formula/kuma-cli.rb << FORMULA
          class KumaCli < Formula
            desc "CLI for managing Uptime Kuma via its native Socket.IO API"
            homepage "https://github.com/pablofmorales/kuma-cli"
            url "https://registry.npmjs.org/@blackasteroid/kuma-cli/-/kuma-cli-${NEW_VERSION}.tgz"
            sha256 "${SHA256}"
            license "MIT"
            version "${NEW_VERSION}"

            depends_on "node"

            def install
              system "npm", "install", *std_npm_args
              bin.install_symlink Dir["#{libexec}/bin/*"]
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/kuma --version")
            end
          end
          FORMULA

          # Fix indentation (heredoc added leading spaces)
          sed -i 's/^          //' Formula/kuma-cli.rb

          git add Formula/kuma-cli.rb
          git diff --cached --quiet || git commit -m "chore: bump kuma-cli to v${NEW_VERSION}"
          git push origin main
