<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <!-- Background gradient: deep dark terminal -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#080d12"/>
    </radialGradient>
    <!-- Green glow for terminal accent -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip to rounded square -->
    <clipPath id="roundedSquare">
      <rect x="4" y="4" width="120" height="120" rx="22" ry="22"/>
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="22" ry="22" fill="url(#bgGrad)"/>

  <!-- Subtle border -->
  <rect x="4" y="4" width="120" height="120" rx="22" ry="22"
        fill="none" stroke="#1a3a2a" stroke-width="1.5"/>

  <!-- Terminal scanlines overlay (subtle) -->
  <g clip-path="url(#roundedSquare)" opacity="0.04">
    <line x1="4" y1="16" x2="124" y2="16" stroke="#39ff14" stroke-width="1"/>
    <line x1="4" y1="24" x2="124" y2="24" stroke="#39ff14" stroke-width="1"/>
    <line x1="4" y1="32" x2="124" y2="32" stroke="#39ff14" stroke-width="1"/>
    <line x1="4" y1="40" x2="124" y2="40" stroke="#39ff14" stroke-width="1"/>
    <line x1="4" y1="48" x2="124" y2="48" stroke="#39ff14" stroke-width="1"/>
    <line x1="4" y1="56" x2="124" y2="56" stroke="#39ff14" stroke-width="1"/>
    <line x1="4" y1="64" x2="124" y2="64" stroke="#39ff14" stroke-width="1"/>
    <line x1="4" y1="72" x2="124" y2="72" stroke="#39ff14" stroke-width="1"/>
    <line x1="4" y1="80" x2="124" y2="80" stroke="#39ff14" stroke-width="1"/>
    <line x1="4" y1="88" x2="124" y2="88" stroke="#39ff14" stroke-width="1"/>
    <line x1="4" y1="96" x2="124" y2="96" stroke="#39ff14" stroke-width="1"/>
    <line x1="4" y1="104" x2="124" y2="104" stroke="#39ff14" stroke-width="1"/>
    <line x1="4" y1="112" x2="124" y2="112" stroke="#39ff14" stroke-width="1"/>
    <line x1="4" y1="120" x2="124" y2="120" stroke="#39ff14" stroke-width="1"/>
  </g>

  <!-- Bear body: stylized geometric bear for CLI context -->
  <!-- Main bear head shape -->
  <ellipse cx="64" cy="58" rx="28" ry="26" fill="#1c2e1e"/>
  <!-- Ears -->
  <circle cx="42" cy="36" r="10" fill="#1c2e1e"/>
  <circle cx="86" cy="36" r="10" fill="#1c2e1e"/>
  <!-- Inner ears (green accent) -->
  <circle cx="42" cy="36" r="6" fill="#0d4a1a"/>
  <circle cx="86" cy="36" r="6" fill="#0d4a1a"/>

  <!-- Bear face -->
  <!-- Eyes: terminal green dots with glow -->
  <circle cx="54" cy="53" r="4.5" fill="#00ff88" filter="url(#glow)"/>
  <circle cx="74" cy="53" r="4.5" fill="#00ff88" filter="url(#glow)"/>
  <!-- Eye pupils -->
  <circle cx="54" cy="53" r="2" fill="#080d12"/>
  <circle cx="74" cy="53" r="2" fill="#080d12"/>
  <!-- Eye reflection -->
  <circle cx="55.5" cy="51.5" r="0.8" fill="#ffffff" opacity="0.6"/>
  <circle cx="75.5" cy="51.5" r="0.8" fill="#ffffff" opacity="0.6"/>

  <!-- Nose -->
  <ellipse cx="64" cy="62" rx="5" ry="3.5" fill="#00cc66"/>
  <!-- Muzzle area -->
  <ellipse cx="64" cy="65" rx="10" ry="7" fill="#162819"/>

  <!-- Mouth: small smile / terminal cursor line -->
  <path d="M 58 68 Q 64 72 70 68" fill="none" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Terminal prompt symbol below bear: > _ -->
  <!-- Prompt bracket -->
  <text x="64" y="100" font-family="'Courier New', Courier, monospace" font-size="18"
        font-weight="bold" fill="#00ff88" text-anchor="middle" filter="url(#softGlow)"
        letter-spacing="2">›_</text>

  <!-- Small circuit/pixel details on sides for tech feel -->
  <rect x="16" y="58" width="6" height="2" rx="1" fill="#00ff88" opacity="0.3"/>
  <rect x="16" y="62" width="4" height="2" rx="1" fill="#00ff88" opacity="0.2"/>
  <rect x="106" y="58" width="6" height="2" rx="1" fill="#00ff88" opacity="0.3"/>
  <rect x="108" y="62" width="4" height="2" rx="1" fill="#00ff88" opacity="0.2"/>
</svg>
